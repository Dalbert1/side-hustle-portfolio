name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Build PartyPlug ──
      - name: Install PartyPlug deps
        run: npm ci
        working-directory: partyplug

      - name: Build PartyPlug
        run: npm run build
        working-directory: partyplug
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Build TulsaHomeHelp ──
      - name: Install TulsaHomeHelp deps
        run: npm ci
        working-directory: tulsahomehelp

      - name: Build TulsaHomeHelp
        run: npm run build
        working-directory: tulsahomehelp
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Build HeelerConstruction ──
      - name: Install HeelerConstruction deps
        run: npm ci
        working-directory: heelerconstruction

      - name: Build HeelerConstruction
        run: npm run build
        working-directory: heelerconstruction

      # ── Build HaughHoney ──
      - name: Install HaughHoney deps
        run: npm ci
        working-directory: haughhoney

      - name: Build HaughHoney
        run: npm run build
        working-directory: haughhoney

      # ── Build OSRS Activity Helper ──
      - name: Install OSRS Activity Helper deps
        run: npm ci
        working-directory: osrs-inv-tracker

      - name: Build OSRS Activity Helper
        run: npm run build
        working-directory: osrs-inv-tracker
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Build Resume Web App ──
      - name: Install Resume deps
        run: npm ci
        working-directory: resume-web-app/frontend

      - name: Build Resume
        run: npm run build
        working-directory: resume-web-app/frontend

      # ── Build Handy Randy's ──
      - name: Install HandyRandys deps
        run: npm ci
        working-directory: handyrandys

      - name: Build HandyRandys
        run: npm run build
        working-directory: handyrandys

      # ── Build Recipe Box ──
      - name: Install RecipeBox deps
        run: npm ci
        working-directory: recipebox

      - name: Build RecipeBox
        run: npm run build
        working-directory: recipebox
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Build WW3 Electric Boogaloo ──
      - name: Install WW3 deps
        run: npm ci
        working-directory: ww3electricboogaloo

      - name: Build WW3
        run: npm run build
        working-directory: ww3electricboogaloo

      # ── Merge all builds into one deploy folder ──
      - name: Assemble site
        run: |
          mkdir -p _site/games
          cp -r partyplug/dist _site/partyplug
          cp -r tulsahomehelp/dist _site/tulsahomehelp
          cp -r heelerconstruction/dist _site/heelerconstruction
          cp -r haughhoney/dist _site/haughhoney
          cp -r osrs-inv-tracker/dist _site/osrs-inv-tracker
          cp -r resume-web-app/frontend/dist _site/resume
          cp -r handyrandys/dist _site/handyrandys
          cp -r recipebox/dist _site/recipebox
          cp -r ww3electricboogaloo/dist _site/ww3
          cp games/*.html _site/games/
          cp index.html _site/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
